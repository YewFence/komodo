name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  MISE_TASK_RUN_AUTO_INSTALL: "false"
  MISE_LOCKED: "1"
  MISE_ENV: "ci"

jobs:
  check:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          add_shims_to_path: true
          cache_key: "mise-check-{{file_hash}}"

      - name: Check
        run: mise run check

  actions-version:
    name: Check Action Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: pinact
          add_shims_to_path: true
          cache_key: "mise-actioncheck-{{install_args_hash}}-{{file_hash}}"

      - name: Check Action pinned versions
        env:
          PINACT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run actions:pin:check

      - name: Check whether Action is outdated
        env:
          PINACT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run actions:outdated

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          add_shims_to_path: true
          cache_key: "mise-audit-{{file_hash}}"

      - name: Audit
        run: mise run audit

  image:
    name: Build ${{ matrix.image }} Image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - core
          - periphery
          - cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: false
          cache: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image
        env:
          IMAGE_CACHE_FROM: type=gha,scope=ci-${{ matrix.image }}
          IMAGE_CACHE_TO: type=gha,mode=max,scope=ci-${{ matrix.image }}
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
          IMAGE_REVISION: ${{ github.sha }}
          IMAGE_SOURCE: ${{ github.server_url }}/${{ github.repository }}
          IMAGE_TAGS: ci-${{ github.sha }}
        run: mise run image:build "${{ matrix.image }}"
