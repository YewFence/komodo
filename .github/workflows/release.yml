name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish"
        required: true
        type: string
      overwrite_latest_tag:
        description: "Whether to overwrite the latest tag"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Whether to mark the GitHub Release as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.head.ref == 'release'
      )
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      checkout_ref: ${{ steps.release.outputs.checkout_ref }}
      should_release: ${{ steps.release.outputs.should_release }}
      create_tag: ${{ steps.release.outputs.create_tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_LOCKED: "1"
      MISE_ENV: "ci"
    steps:
      - name: Ensure tag input
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' }}
        run: |
          echo "tag must not be empty"
          exit 1

      - name: Validate tag input
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "${INPUT_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "tag must use vMAJOR.MINOR.PATCH, optionally followed by a pre-release suffix like -rc.1"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.merge_commit_sha || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: git-cliff
          add_shims_to_path: true
          cache_key: "mise-release-version-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve release metadata
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          REF_NAME: ${{ github.ref_name }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          tag=""
          checkout_ref="${GITHUB_SHA}"
          should_release="false"
          create_tag="false"
          prerelease="false"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
            checkout_ref="${INPUT_TAG}"
            should_release="true"
            prerelease="${INPUT_PRERELEASE}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${REF_NAME}"
            checkout_ref="${REF_NAME}"
            should_release="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            tag="$(mise run release:tag)"
            checkout_ref="${MERGE_COMMIT_SHA:-${GITHUB_SHA}}"
            should_release="true"
            create_tag="true"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "tag must use vMAJOR.MINOR.PATCH, optionally followed by a pre-release suffix like -rc.1"
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" && "${tag}" == *-* ]]; then
            prerelease="true"
          fi

          echo "Resolved release tag ${tag}"
          echo "Release checkout ref ${checkout_ref}"
          echo "Create tag ${create_tag}"
          echo "Prerelease ${prerelease}"

          {
            echo "## Release Metadata"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Event | \`${GITHUB_EVENT_NAME}\` |"
            echo "| Release tag | \`${tag}\` |"
            echo "| Version | \`${tag#v}\` |"
            echo "| Checkout ref | \`${checkout_ref}\` |"
            echo "| Should release | \`${should_release}\` |"
            echo "| Create tag | \`${create_tag}\` |"
            echo "| Prerelease | \`${prerelease}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

          {
            echo "tag=${tag}"
            echo "checkout_ref=${checkout_ref}"
            echo "should_release=${should_release}"
            echo "create_tag=${create_tag}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate release PR freshness
        if: ${{ github.event_name == 'pull_request' && steps.release.outputs.create_tag == 'true' }}
        env:
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          release_base_sha="$(
            jq -r '.pull_request.body // ""' "${GITHUB_EVENT_PATH}" |
              sed -n -E 's/^<!-- release-base-sha: ([0-9a-f]{40}) -->$/\1/p' |
              head -n 1
          )"
          if [[ -z "${release_base_sha}" ]]; then
            echo "release PR does not contain a release-base-sha marker"
            echo "rerun the prepare release workflow to refresh the release PR"
            exit 1
          fi

          parent_count="$(git show -s --format=%P "${MERGE_COMMIT_SHA}" | wc -w)"
          if [[ "${parent_count}" -lt 1 ]]; then
            echo "release commit has no parent, so the release base cannot be validated"
            exit 1
          fi

          merge_base_sha="$(git rev-parse "${MERGE_COMMIT_SHA}^1")"
          if [[ "${merge_base_sha}" != "${release_base_sha}" ]]; then
            echo "release PR is stale"
            echo "release PR was prepared from ${release_base_sha}"
            echo "release PR was merged into ${merge_base_sha}"
            echo "rerun the prepare release workflow and merge the refreshed release PR"
            exit 1
          fi

          changelog_version="$(grep -Eom1 'v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?' CHANGELOG.md || true)"
          if [[ -z "${changelog_version}" ]]; then
            echo "could not find a release version in CHANGELOG.md"
            exit 1
          fi

          changelog_tag="v${changelog_version#v}"
          if [[ "${changelog_tag}" != "${RELEASE_TAG}" ]]; then
            echo "CHANGELOG.md first release version ${changelog_tag} does not match resolved release tag ${RELEASE_TAG}"
            echo "rerun the prepare release workflow to regenerate CHANGELOG.md"
            exit 1
          fi

          echo "Validated release PR freshness"
          {
            echo "| Release PR Fresh | \`true\` |"
            echo "| Release Base SHA | \`${release_base_sha}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

  build-linux:
    name: Build Linux ${{ matrix.asset_suffix }}
    needs: version
    if: ${{ needs.version.outputs.should_release == 'true' }}
    runs-on: ${{ matrix.runner }}
    container: rust:1.95.0-bookworm
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_LOCKED: "1"
      MISE_ENV: "ci"
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            asset_suffix: x86_64
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            asset_suffix: aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.version.outputs.checkout_ref }}

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: rust
          add_shims_to_path: true
          cache_key: "mise-release-linux-${{ matrix.asset_suffix }}-{{install_args_hash}}-{{file_hash}}"

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /usr/local/cargo/git
            /usr/local/cargo/registry
            target
          key: cargo-${{ matrix.rust_target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.rust_target }}-

      - name: Build release binaries
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: mise run release:build

      - name: Package release binaries
        env:
          RELEASE_ARTIFACT_DIR: dist
          RELEASE_SUFFIX: ${{ matrix.asset_suffix }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: mise run release:package

      - name: Upload release binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.asset_suffix }}
          path: dist/*
          if-no-files-found: error

  build-apple:
    name: Build Apple arm64
    needs: version
    if: ${{ needs.version.outputs.should_release == 'true' }}
    runs-on: macos-15
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_LOCKED: "1"
      MISE_ENV: "ci"
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.version.outputs.checkout_ref }}

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: rust
          add_shims_to_path: true
          cache_key: "mise-release-apple-{{install_args_hash}}-{{file_hash}}"

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-apple-arm64-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-apple-arm64-

      - name: Build release binaries
        env:
          RUST_TARGET: aarch64-apple-darwin
        run: mise run release:build

      - name: Package release binaries
        env:
          RELEASE_ARTIFACT_DIR: dist
          RELEASE_SUFFIX: apple
          RUST_TARGET: aarch64-apple-darwin
        run: mise run release:package

      - name: Upload release binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-apple
          path: dist/*
          if-no-files-found: error

  publish-images:
    name: Publish ${{ matrix.image }} Image
    needs: version
    if: ${{ needs.version.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_LOCKED: "1"
      MISE_ENV: "ci"
    strategy:
      fail-fast: false
      matrix:
        image:
          - core
          - periphery
          - cli
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.version.outputs.checkout_ref }}

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: false
          cache: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        env:
          PRERELEASE: ${{ needs.version.outputs.prerelease }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          version="${RELEASE_TAG#v}"
          tags="${version}"
          if [[ "${PRERELEASE}" != "true" ]]; then
            IFS=. read -r major minor _ <<< "${version}"
            tags="${tags},${major}.${minor},${major},latest"
          fi
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Build and publish image
        env:
          IMAGE_CACHE_FROM: type=gha,scope=release-${{ matrix.image }}
          IMAGE_CACHE_TO: type=gha,mode=max,scope=release-${{ matrix.image }}
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
          IMAGE_PLATFORMS: linux/amd64,linux/arm64
          IMAGE_PUSH: "true"
          IMAGE_REGISTRY: ghcr.io
          IMAGE_REVISION: ${{ github.sha }}
          IMAGE_SOURCE: ${{ github.server_url }}/${{ github.repository }}
          IMAGE_TAGS: ${{ steps.tags.outputs.tags }}
          IMAGE_VERSION: ${{ needs.version.outputs.tag }}
        run: mise run image:build "${{ matrix.image }}"

  release:
    name: Publish GitHub Release
    needs:
      - version
      - build-linux
      - build-apple
      - publish-images
    if: ${{ needs.version.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_LOCKED: "1"
      MISE_ENV: "ci"
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.version.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: git-cliff
          add_shims_to_path: true
          cache_key: "mise-release-notes-{{install_args_hash}}-{{file_hash}}"

      - name: Generate release notes
        id: notes
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          notes_file="${RUNNER_TEMP}/release-notes.md"
          RELEASE_NOTES_OUTPUT="${notes_file}" mise run release:notes

          echo "Generated release notes at ${notes_file}"
          {
            echo "## Publish GitHub Release"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Release tag | \`${RELEASE_TAG}\` |"
            echo "| Prerelease | \`${{ needs.version.outputs.prerelease }}\` |"
            echo "| Create tag | \`${{ needs.version.outputs.create_tag }}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Create release tag
        if: ${{ needs.version.outputs.create_tag == 'true' }}
        env:
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          mise run release:tag:create
          git push origin "${RELEASE_TAG}"
          echo "Created release tag ${RELEASE_TAG}"
          echo "| Release tag Created | \`true\` |" >> "${GITHUB_STEP_SUMMARY}"

      - name: Record existing release tag
        if: ${{ needs.version.outputs.create_tag != 'true' }}
        env:
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          echo "Using existing release tag ${RELEASE_TAG}"
          echo "| Release tag Created | \`false\` |"  >> "${GITHUB_STEP_SUMMARY}"

      - name: Download release binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          RELEASE_ARTIFACT_DIR: dist
        run: mise run release:checksums

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Komodo ${{ needs.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
          prerelease: ${{ needs.version.outputs.prerelease }}

      - name: Summarize published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          release_url="$(gh release view "${RELEASE_TAG}" --json url --jq .url)"
          echo "Published GitHub Release ${release_url}"
          echo "| URL | ${release_url} |" >> "${GITHUB_STEP_SUMMARY}"

      - name: Move latest tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.overwrite_latest_tag }}
        env:
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          release_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
          git tag -fa latest -m "latest -> ${RELEASE_TAG}" "${release_commit}"
          git push --force origin refs/tags/latest
          echo "Moved latest tag to ${RELEASE_TAG}"
          {
            echo "| Moved Latest Tag | \`${RELEASE_TAG}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Record latest tag unchanged
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.overwrite_latest_tag != true }}
        run: |
          echo "latest tag was not moved"
          echo "| Moved Latest Tag | \`skipped\` |" >> "${GITHUB_STEP_SUMMARY}"

  close-superseded-release-pr:
    name: Close Superseded Release PR
    needs:
      - version
      - release
    if: >-
      needs.version.outputs.should_release == 'true' &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Close superseded release PR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          pr_json="$(gh pr list --head release --base main --state open --json number,title,body --jq '.[0] // empty')"
          if [[ -z "${pr_json}" ]]; then
            echo "No open release PR to close"
            echo "| Superseded Release PR | \`none\` |" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          pr_number="$(jq -r '.number' <<< "${pr_json}")"
          pr_title="$(jq -r '.title // ""' <<< "${pr_json}")"
          pr_body="$(jq -r '.body // ""' <<< "${pr_json}")"
          if [[ "${pr_title}" != "chore: release ${RELEASE_TAG}" || "${pr_body}" != *"Prepare ${RELEASE_TAG}."* ]]; then
            echo "Open release PR #${pr_number} does not match ${RELEASE_TAG}. Skipping close."
            echo "| Superseded Release PR | \`skipped #${pr_number}\` |" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          gh pr comment "${pr_number}" --body "Autoclosing because ${RELEASE_TAG} has already been published manually."
          gh pr edit "${pr_number}" --title "chore: release ${RELEASE_TAG} [autoclosed]"
          gh pr close "${pr_number}"
          echo "Closed superseded release PR #${pr_number}"
          echo "| Superseded Release PR | \`closed #${pr_number}\` |" >> "${GITHUB_STEP_SUMMARY}"
