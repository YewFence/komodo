[tools]
git-cliff = "latest"

[tasks.'actions:pin:check']
# Need github token to avoid rate limit
description = "Check for action pinned version"
run = "pinact run --check"

[tasks.'actions:outdated']
# Need github token to avoid rate limit
description = "Check for outdated action versions"
run = "pinact run --update --diff"

[tasks.'release:version']
description = "Print the next release version without the v prefix"
shell = "bash -c"
run = """
version="$(git cliff --bumped-version)"
version="${version#v}"
if [[ -z "${version}" ]]; then
  echo "git cliff did not resolve a version"
  exit 1
fi

printf '%s\\n' "${version}"
"""

[tasks.'release:version:set']
description = "Set the Cargo workspace version for RELEASE_TAG, or for the next release tag"
shell = "bash -c"
run = """
tag="$(mise run release:tag)"
cargo set-version --workspace "${tag#v}"
"""

[tasks.'release:tag']
description = "Print the release tag, automatically generate if RELEASE_TAG is not set"
shell = "bash -c"
run = """
tag="${RELEASE_TAG:-}"
if [[ -z "${tag}" ]]; then
  version="$(mise run release:version)"
  tag="v${version}"
fi
printf '%s\\n' "${tag}"
"""

[tasks.'release:notes']
description = "Generate release notes for RELEASE_TAG, or for the next release tag"
shell = "bash -c"
run = """
tag="$(mise run release:tag)"

cliff_mode="--unreleased"
if git tag --points-at HEAD | grep -Fxq "${tag}"; then
  cliff_mode="--current"
fi

output="${RELEASE_NOTES_OUTPUT:-}"
if [[ -n "${output}" ]]; then
  mkdir -p "$(dirname "${output}")"
  git cliff "${cliff_mode}" --tag "${tag}" --strip all > "${output}"

  if [[ ! -s "${output}" ]]; then
    echo "Release ${tag}" > "${output}"
  fi
else
  git cliff "${cliff_mode}" --tag "${tag}" --strip all
fi
"""

[tasks.'release:changelog']
description = "Update CHANGELOG.md for RELEASE_TAG, or for the next release tag"
shell = "bash -c"
run = """
tag="$(mise run release:tag)"

if [[ -f CHANGELOG.md ]]; then
  git cliff --unreleased --tag "${tag}" --prepend CHANGELOG.md
else
  git cliff --unreleased --tag "${tag}" --output CHANGELOG.md
fi
"""

[tasks.'release:tag:create']
description = "Create the release tag for RELEASE_TAG, or for the next release tag"
shell = "bash -c"
run = """
tag="$(mise run release:tag)"

if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
  existing_commit="$(git rev-list -n 1 "${tag}")"
  current_commit="$(git rev-parse HEAD)"
  if [[ "${existing_commit}" != "${current_commit}" ]]; then
    echo "tag ${tag} already exists, but it does not point to the current commit"
    exit 1
  fi
  echo "tag ${tag} already exists. Skipping tag creation"
else
  git tag -a "${tag}" -m "Release ${tag}"
fi
"""

[tasks.'release:package']
description = "Package the Komodo CLI and Periphery release binaries"
run = "scripts/package.sh"

[tasks.'release:build']
description = "Build the Komodo CLI and Periphery release binaries"
shell = "bash -c"
run = '''
set -euo pipefail

target="${RUST_TARGET:-}"
args=(cargo build --locked --release)
if [[ -n "${target}" ]]; then
  rustup target add "${target}"
  args+=(--target "${target}")
fi
args+=(-p komodo_cli -p komodo_periphery)
"${args[@]}"
'''

[tasks.'image:build']
description = "Build a Komodo container image locally or publish a multi-platform image"
shell = "bash -c"
usage = '''
arg "<image>" help="Image to build" {
  choices "core" "periphery" "cli"
}
'''
run = '''
set -euo pipefail

image="${usage_image?}"
case "${image}" in
  core)
    dockerfile="bin/core/aio.Dockerfile"
    ;;
  periphery)
    dockerfile="bin/periphery/aio.Dockerfile"
    ;;
  cli)
    dockerfile="bin/cli/aio.Dockerfile"
    ;;
esac

registry="${IMAGE_REGISTRY:-}"
namespace="${IMAGE_NAMESPACE:-local}"
namespace="${namespace,,}"
repository="${namespace}/komodo-${image}"
if [[ -n "${registry}" ]]; then
  repository="${registry%/}/${repository}"
fi

platforms="${IMAGE_PLATFORMS:-linux/amd64}"
tags="${IMAGE_TAGS:-dev}"

args=(
  docker buildx build
  --file "${dockerfile}"
  --platform "${platforms}"
)

while IFS= read -r tag; do
  [[ -n "${tag}" ]] || continue
  args+=(--tag "${repository}:${tag}")
done < <(printf '%s\n' "${tags}" | tr ', ' '\n\n')

if [[ "${IMAGE_PUSH:-false}" == "true" ]]; then
  args+=(--push)
else
  if [[ "${platforms}" == *,* ]]; then
    echo "A multi-platform image must be pushed; set IMAGE_PUSH=true" >&2
    exit 1
  fi
  args+=(--load)
fi

if [[ -n "${IMAGE_CACHE_FROM:-}" ]]; then
  args+=(--cache-from "${IMAGE_CACHE_FROM}")
fi
if [[ -n "${IMAGE_CACHE_TO:-}" ]]; then
  args+=(--cache-to "${IMAGE_CACHE_TO}")
fi
if [[ -n "${IMAGE_SOURCE:-}" ]]; then
  args+=(--label "org.opencontainers.image.source=${IMAGE_SOURCE}")
fi
if [[ -n "${IMAGE_REVISION:-}" ]]; then
  args+=(--label "org.opencontainers.image.revision=${IMAGE_REVISION}")
fi
if [[ -n "${IMAGE_VERSION:-}" ]]; then
  args+=(--label "org.opencontainers.image.version=${IMAGE_VERSION}")
fi

args+=(.)
printf 'Running:'
printf ' %q' "${args[@]}"
printf '\n'
"${args[@]}"
'''
